<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tirage au sort - Accueil</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Bangers&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Nunito',sans-serif;
  background:#1a1a2e;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.container{
  text-align:center;
}

h1{
  font-family:'Bangers',cursive;
  font-size:3rem;
  color:#f5c518;
  margin-bottom:40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,200px);
  gap:20px;
  justify-content:center;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  height:120px;
  border-radius:20px;
  font-size:2rem;
  font-weight:900;
  text-decoration:none;
  color:white;
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.05);
}

.miq6{background:#e03e2d;}
.miq5{background:#1e4d9b;}
.miq4{background:#3daa44;}
.miq3{background:#f47920;}

</style>
</head>

<body>
<div class="container">
  <h1>🎰 Tirage au sort</h1>

  <div class="grid">
    <a class="btn miq6" href="tirage.html?classe=miq6">MIQ6</a>
    <a class="btn miq5" href="tirage.html?classe=miq5">MIQ5</a>
    <a class="btn miq4" href="tirage.html?classe=miq4">MIQ4</a>
    <a class="btn miq3" href="tirage.html?classe=miq3">MIQ3</a>
  </div>
</div>
</body>
</html>
