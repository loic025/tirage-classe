<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tirage au sort - classe de sixième</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Bangers&display=swap" rel="stylesheet">
<style>:root{--red:#e03e2d;--yellow:#f5c518;--green:#3daa44;--blue:#1e4d9b;--orange:#f47920;--brown:#5c3317;--white:#fffdf7;--dark:#1a1a2e}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Nunito',sans-serif;background:var(--dark);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;overflow-x:hidden;position:relative}body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,var(--red) 2px,transparent 2px) , radial-gradient(circle,var(--yellow) 2px,transparent 2px) , radial-gradient(circle,var(--green) 2px,transparent 2px) , radial-gradient(circle,var(--blue) 2px,transparent 2px) , radial-gradient(circle,var(--orange) 2px,transparent 2px);background-size:120px 120px , 80px 80px , 100px 100px , 90px 90px , 70px 70px;background-position:0 0 , 40px 40px , 20px 60px , 60px 20px , 10px 50px;opacity:.07;pointer-events:none;z-index:0}.container{position:relative;z-index:1;width:100%;max-width:860px;display:flex;flex-direction:column;align-items:center;gap:24px}.title-block{text-align:center;margin-bottom:4px}.title-block h1{font-family:'Bangers',cursive;font-size:clamp(2.2rem,6vw,4rem);letter-spacing:3px;line-height:1;background:linear-gradient(135deg,var(--yellow),var(--orange),var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 8px rgba(245,197,24,.4))}.title-block p{color:rgba(255,255,255,.5);font-size:.85rem;margin-top:4px;letter-spacing:1px;text-transform:uppercase}.mm-dots{display:flex;gap:8px;justify-content:center;margin-bottom:4px}.mm-dot{width:18px;height:18px;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.4)}.main-layout{display:flex;gap:24px;width:100%;align-items:flex-start;flex-wrap:wrap;justify-content:center}.panel{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);border-radius:20px;padding:20px;flex:1;min-width:240px;max-width:300px}.panel h2{font-size:1rem;font-weight:800;color:var(--yellow);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}textarea{width:100%;height:180px;background:rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.15);border-radius:12px;color:#fff;font-family:'Nunito',sans-serif;font-size:.9rem;padding:10px 12px;resize:vertical;outline:none;transition:border-color .2s;line-height:1.6}textarea:focus{border-color:var(--yellow)}textarea::placeholder{color:rgba(255,255,255,.3)}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:50px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;transition:transform .15s , filter .15s;white-space:nowrap}.btn:hover:not(:disabled) {filter:brightness(1.1);transform:translateY(-2px)}.btn:active:not(:disabled) {transform:translateY(0)}.btn:disabled{opacity:.4;cursor:not-allowed}.btn-load{background:var(--blue);color:#fff;padding:10px 18px;font-size:.9rem;width:100%;margin-top:10px}.btn-reset{background:var(--red);color:#fff;padding:8px 16px;font-size:.82rem;width:100%;margin-top:10px}.counter{margin-top:12px;font-size:.8rem;color:rgba(255,255,255,.5);text-align:center}.counter span{color:var(--yellow);font-weight:700}.slot-area{flex:1.5;min-width:280px;max-width:440px;display:flex;flex-direction:column;align-items:center;gap:16px}.machine-body{background:linear-gradient(160deg,#2a2a4a 0%,#1a1a2e 100%);border:3px solid rgba(255,255,255,.12);border-radius:24px;padding:24px;width:100%;display:flex;flex-direction:column;align-items:center;gap:20px;box-shadow:0 20px 60px rgba(0,0,0,.5) , inset 0 1px 0 rgba(255,255,255,.1);position:relative;overflow:hidden}.lights-strip{display:flex;gap:8px;margin-bottom:-8px}.light{width:10px;height:10px;border-radius:50%;animation:blink 1.2s ease-in-out infinite}.light:nth-child(1) {background:var(--red);animation-delay:0s}.light:nth-child(2) {background:var(--yellow);animation-delay:.2s}.light:nth-child(3) {background:var(--green);animation-delay:.4s}.light:nth-child(4) {background:var(--blue);animation-delay:.6s}.light:nth-child(5) {background:var(--orange);animation-delay:.8s}.light:nth-child(6) {background:var(--red);animation-delay:1.0s}.light:nth-child(7) {background:var(--yellow);animation-delay:.2s}.light:nth-child(8) {background:var(--green);animation-delay:.4s}.light:nth-child(9) {background:var(--blue);animation-delay:.6s}@keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.2; }
    }.reel-window{width:100%;height:110px;background:#0a0a1a;border-radius:16px;border:3px solid rgba(255,255,255,.1);overflow:hidden;position:relative;box-shadow:inset 0 4px 20px rgba(0,0,0,.8)}.reel-window::before,.reel-window::after{content:'';position:absolute;left:0;right:0;height:32px;z-index:3;pointer-events:none}.reel-window::before{top:0;background:linear-gradient(to bottom,#0a0a1a,transparent)}.reel-window::after{bottom:0;background:linear-gradient(to top,#0a0a1a,transparent)}.reel-center-line{position:absolute;top:50%;left:0;right:0;height:54px;margin-top:-27px;border-top:2px solid rgba(245,197,24,.6);border-bottom:2px solid rgba(245,197,24,.6);background:rgba(245,197,24,.04);z-index:2;pointer-events:none}.reel-track{position:absolute;top:0;left:0;right:0;display:flex;flex-direction:column;align-items:center;will-change:transform}.reel-item{height:110px;display:flex;align-items:center;justify-content:center;width:100%;padding:0 16px;font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(1rem,3.5vw,1.5rem);color:#fff;text-align:center;line-height:1.2;flex-shrink:0}.btn-spin{background:linear-gradient(135deg,var(--yellow),var(--orange));color:var(--brown);padding:14px 40px;font-size:1.1rem;letter-spacing:1px;box-shadow:0 6px 20px rgba(245,197,24,.4);width:100%}.btn-spin:not(:disabled):hover {box-shadow:0 8px 28px rgba(245,197,24,.6)}.result-display{width:100%;min-height:56px;background:rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.08);border-radius:14px;display:flex;align-items:center;justify-content:center;padding:12px 16px;text-align:center}.result-display .result-text{font-weight:800;font-size:1.1rem;color:var(--white);opacity:.4;transition:opacity .3s}.result-display.has-result .result-text{opacity:1}.result-display .winner-label{font-size:.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--yellow);font-weight:700;display:block;margin-bottom:2px}.history-panel{width:100%;max-width:860px}.history-panel h2{font-size:.85rem;font-weight:800;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}.history-list{display:flex;flex-wrap:wrap;gap:8px}.history-tag{padding:4px 14px;border-radius:50px;font-size:.82rem;font-weight:700;color:#fff;opacity:.8;display:flex;align-items:center;gap:6px}.history-tag .num{background:rgba(0,0,0,.25);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:900}.celebration{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden}.confetti-piece{position:absolute;width:10px;height:10px;border-radius:50%;animation:confettiFall 1.5s ease-in forwards}@keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }@keyframes winnerFlash {
      0%,100% { background: rgba(245,197,24,0.0); }
      30%     { background: rgba(245,197,24,0.12); }
      60%     { background: rgba(245,197,24,0.06); }
    }.machine-body.flash{animation:winnerFlash .6s ease}@keyframes spinnerPulse {
      0%,100% { box-shadow: 0 6px 20px rgba(245,197,24,0.4); }
      50%     { box-shadow: 0 6px 40px rgba(245,197,24,0.9); }
    }.spinning .btn-spin{animation:spinnerPulse .4s ease infinite}.empty-hint{color:rgba(255,255,255,.25);font-size:.85rem;text-align:center;padding:8px}.no-more{color:var(--orange);font-weight:800;text-align:center;font-size:.9rem}</style>
</head>
<body>
<div class="celebration" id="celebration"></div>
<div class="container">
<!-- TITLE -->
<div class="title-block">
<div class="mm-dots">
<div class="mm-dot" style="background:var(--red)"></div>
<div class="mm-dot" style="background:var(--yellow)"></div>
<div class="mm-dot" style="background:var(--green)"></div>
<div class="mm-dot" style="background:var(--blue)"></div>
<div class="mm-dot" style="background:var(--orange)"></div>
<div class="mm-dot" style="background:var(--brown)"></div>
</div>
<h1>🎰 Tirage au sort en classe</h1>
<p>Chaque tiré est exclu des prochains tours</p>
<p id="classeTitle">Classe : MIQ6</p>
</div>
<!-- MAIN -->
<div class="main-layout">
<!-- INPUT PANEL -->
<div class="panel">
<h2>📋 Participants</h2>
<textarea id="inputList">Max
Rayan
Mila
</textarea>
<button class="btn btn-load" onclick="loadList()">✅ Charger la liste</button>
<button class="btn btn-reset" onclick="resetAll()">🔄 Remettre à zéro</button>
<div class="counter" id="counter">Aucune liste chargée</div>
</div>
<!-- SLOT MACHINE -->
<div class="slot-area">
<div class="machine-body" id="machineBody">
<div class="lights-strip">
<div class="light"></div><div class="light"></div><div class="light"></div>
<div class="light"></div><div class="light"></div><div class="light"></div>
<div class="light"></div><div class="light"></div><div class="light"></div>
</div>
<div class="reel-window">
<div class="reel-center-line"></div>
<div class="reel-track" id="reelTrack">
<div class="reel-item" style="color:rgba(255,255,255,0.2)">— — —</div>
</div>
</div>
<div class="result-display" id="resultDisplay">
<div class="result-text" id="resultText">Chargez une liste et lancez !</div>
</div>
<button class="btn btn-spin" id="spinBtn" onclick="spin()" disabled>
🎰 &nbsp;LANCER !
</button>
</div>
</div>
</div>
<!-- HISTORY -->
<div class="history-panel" id="historyPanel" style="display:none">
<h2>🏷️ Historique des tirages</h2>
<div class="history-list" id="historyList"></div>
</div>
</div>
<script>

  const defaultLists = {
  miq6: ["Max","Rayan","Mila","Timéo","William","Anaïs","Thalia","Sasha","Paul","Abby"],
  miq5: ["Élève1","Élève2","Élève3"],
  miq4: ["Alice","Bob","Charlie"],
  miq3: ["Jean","Léo","Emma"]
};

  let classe = "miq6";

window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  classe = params.get("classe") || "miq6";

  document.getElementById("classeTitle").textContent =
    "Classe : " + classe.toUpperCase();

  const saved = localStorage.getItem(classe);

  let items;

  if (saved) {
    items = JSON.parse(saved);
  } else {
    items = defaultLists[classe] || [];
  }

  allItems = items;
  remaining = [...items];

  document.getElementById("inputList").value = items.join("\n");

  colorMap = {};
  items.forEach((item, i) => {
    colorMap[item] = COLORS[i % COLORS.length];
  });

  updateUI();
  resetReelDisplay();
});



 function resetAll() {
  remaining = [...allItems];
  drawn = [];

  updateUI();
  resetReelDisplay();
  showResult('', false);

  localStorage.removeItem(classe); // 💾 supprime sauvegarde
}

  function loadList() {
  const raw = document.getElementById('inputList').value;

  const items = raw.split('\n')
    .map(s => s.trim())
    .filter(s => s.length > 0);

  if (items.length === 0) return;

  allItems = items;
  remaining = [...items];
  drawn = [];

  colorMap = {};
  items.forEach((item, i) => {
    colorMap[item] = COLORS[i % COLORS.length];
  });

  // 💾 SAUVEGARDE ICI (IMPORTANT)
  localStorage.setItem(classe, JSON.stringify(items));

  updateUI();
  resetReelDisplay();
  showResult('', false);
}

  function updateUI() {
  const total = allItems.length;
  const rem = remaining.length;
  const counterEl = document.getElementById('counter');
  const spinBtn = document.getElementById('spinBtn');

  if (total === 0) {
    counterEl.innerHTML = 'Aucune liste chargée';
    spinBtn.disabled = true;
  } 
  else if (rem === 0) {
    counterEl.innerHTML = `<span class="no-more">Tous les participants ont été tirés !</span>`;
    spinBtn.disabled = true;
  } 
  else {
    counterEl.innerHTML = `<span>${rem}</span> restant${rem > 1 ? 's' : ''} sur ${total}`;
    spinBtn.disabled = false;
  }
}

  function resetReelDisplay() {
    const track = document.getElementById('reelTrack');
    track.innerHTML = '<div class="reel-item" style="color:rgba(255,255,255,0.2)">— — —</div>';
    track.style.transition = 'none';
    track.style.transform = 'translateY(0)';
  }

  function showResult(name, hasResult) {
    const display = document.getElementById('resultDisplay');
    const text = document.getElementById('resultText');
    if (hasResult) {
      display.classList.add('has-result');
      text.innerHTML = `<span class="winner-label">🎉 Tiré au sort</span>${name}`;
    } else {
      display.classList.remove('has-result');
      text.innerHTML = name || 'Chargez une liste et lancez !';
    }
  }

  function spin() {
    if (isSpinning || remaining.length === 0) return;
    isSpinning = true;
    document.getElementById('spinBtn').disabled = true;
    document.getElementById('machineBody').classList.add('spinning');

    // Pick winner
    const winIdx = Math.floor(Math.random() * remaining.length);
    const winner = remaining[winIdx];

    // Build reel items: shuffle + put winner in center
    const pool = shuffleArray([...remaining]);
    // Ensure enough items for scrolling illusion
    let reelItems = [];
    const rounds = 4;
    for (let r = 0; r < rounds; r++) {
      reelItems = reelItems.concat(shuffleArray([...remaining]));
    }
    // Last visible: winner
    reelItems.push(winner);

    // Render reel
    const track = document.getElementById('reelTrack');
    track.style.transition = 'none';
    track.style.transform = 'translateY(0)';
    track.innerHTML = '';
    reelItems.forEach(name => {
      const div = document.createElement('div');
      div.className = 'reel-item';
      div.textContent = name;
      div.style.color = colorMap[name] || '#fff';
      track.appendChild(div);
    });

    const itemH = 110;
    const totalItems = reelItems.length;
    // We want winner at center → last item
    const targetY = -(totalItems - 1) * itemH;

    // Start from top
    track.style.transform = `translateY(0px)`;

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        // Fast scroll with ease-out
        const duration = 2200 + Math.random() * 600;
        track.style.transition = `transform ${duration}ms cubic-bezier(0.15, 0.85, 0.35, 1.0)`;
        track.style.transform = `translateY(${targetY}px)`;

        setTimeout(() => {
          // Done!
          isSpinning = false;
          document.getElementById('machineBody').classList.remove('spinning');

          // Remove from remaining
          remaining.splice(winIdx, 1);
          drawn.push(winner);

          showResult(winner, true);
          updateUI();
          addToHistory(winner);
          celebrate(colorMap[winner] || '#F5C518');

          // Flash machine
          const body = document.getElementById('machineBody');
          body.classList.add('flash');
          setTimeout(() => body.classList.remove('flash'), 700);

        }, duration + 50);
      });
    });
  }

  function addToHistory(name) {
    const panel = document.getElementById('historyPanel');
    const list = document.getElementById('historyList');
    panel.style.display = 'block';

    const tag = document.createElement('div');
    tag.className = 'history-tag';
    tag.style.background = colorMap[name] || '#F47920';
    tag.innerHTML = `<span class="num">${drawn.length}</span>${name}`;
    list.appendChild(tag);
  }

  function celebrate(color) {
    const container = document.getElementById('celebration');
    container.innerHTML = '';
    const colors = ['#E03E2D','#F5C518','#3DAA44','#1E4D9B','#F47920', color];
    for (let i = 0; i < 60; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.top = '-10px';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.width = (6 + Math.random() * 8) + 'px';
      p.style.height = (6 + Math.random() * 8) + 'px';
      p.style.animationDelay = Math.random() * 0.8 + 's';
      p.style.animationDuration = (1.2 + Math.random() * 0.8) + 's';
      container.appendChild(p);
    }
    setTimeout(() => { container.innerHTML = ''; }, 3000);
  }

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
</script>
</body>
</html>
